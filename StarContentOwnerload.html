<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owner Workload — Star Content 2025-26</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  background: #f4f6f9;
  color: #1a1a2e;
  min-height: 100vh;
}
#page-header {
  background: #1a1a2e;
  color: #fff;
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 44px;
}
#page-header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; white-space: nowrap; }
#page-header .subtitle { font-size: 11px; color: rgba(255,255,255,0.55); white-space: nowrap; }
#page-header .window-badge {
  font-size: 11px; background: rgba(255,255,255,0.12);
  border-radius: 4px; padding: 2px 8px;
  color: rgba(255,255,255,0.8); white-space: nowrap;
}
#page-header .updated-label {
  font-size: 11px; color: rgba(255,255,255,0.4);
  margin-left: auto; white-space: nowrap;
}

#toolbar {
  background: #fff; border-bottom: 1px solid #e2e5ea;
  padding: 10px 28px; display: flex; align-items: center;
  gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.filter-label { font-size: 11px; color: #6b7280; white-space: nowrap; }
.tb-sep { width: 1px; height: 20px; background: #e2e5ea; }
.lvl-btn {
  padding: 4px 10px; border-radius: 4px; border: 1px solid #d1d5db;
  background: transparent; color: #374151; cursor: pointer; font-size: 11px;
  transition: all 0.15s;
}
.lvl-btn:hover { background: #f0f4ff; border-color: #93c5fd; }
.lvl-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.dd-wrapper { position: relative; }
.dd-btn {
  padding: 4px 10px; border-radius: 4px; border: 1px solid #d1d5db;
  background: transparent; color: #374151; cursor: pointer; font-size: 11px; white-space: nowrap;
}
.dd-btn:hover { background: #f0f4ff; }
.dd-panel {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  background: #fff; border: 1px solid #d1d5db; border-radius: 6px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12); z-index: 200;
  min-width: 180px; max-height: 280px; overflow-y: auto;
}
.dd-panel.open { display: block; }
.dd-opt { display: flex; align-items: center; gap: 7px; padding: 5px 10px; cursor: pointer; font-size: 11px; }
.dd-opt:hover { background: #f5f7ff; }
.dd-opt input { margin: 0; cursor: pointer; }
.dd-divider { height: 1px; background: #e5e7eb; margin: 3px 0; }
#result-count { font-size: 11px; color: #9ca3af; white-space: nowrap; margin-left: auto; }

/* Summary bar */
#summary-bar {
  margin: 16px 28px 0;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.sum-card {
  background: #fff; border-radius: 8px; border: 1px solid #e2e5ea;
  padding: 12px 16px; flex: 1; min-width: 150px; max-width: 200px;
  display: flex; flex-direction: column; gap: 3px;
}
.sum-card.warn { border-left: 4px solid #ef4444; }
.sum-card.caution { border-left: 4px solid #f59e0b; }
.sum-card.ok { border-left: 4px solid #27ae60; }
.sum-card.info { border-left: 4px solid #4a90d9; }
.sc-num { font-size: 28px; font-weight: 700; line-height: 1; }
.sc-label { font-size: 11px; color: #6b7280; line-height: 1.3; }
.sc-detail { font-size: 10px; color: #9ca3af; margin-top: 2px; }

/* Owner cards grid */
#main-content { padding: 16px 28px 40px; }
.section-header {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: #9ca3af;
  padding-bottom: 6px; border-bottom: 1px solid #e2e5ea;
  margin-bottom: 14px; margin-top: 24px;
}
.section-header:first-child { margin-top: 0; }
.owner-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 14px;
}
.owner-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width: 1200px) {
  .owner-grid-3 { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
}
.owner-card {
  background: #fff; border-radius: 10px; border: 1px solid #e2e5ea;
  overflow: hidden; transition: box-shadow 0.15s;
}
.owner-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.oc-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #f3f4f6;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.oc-name { font-size: 16px; font-weight: 700; color: #1a1a2e; }
.oc-count { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.oc-badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }

/* Health bar */
.health-bar-wrap { padding: 10px 16px 0; }
.health-bar-label { font-size: 10px; color: #9ca3af; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.health-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; gap: 1px; }
.hb-seg { transition: width 0.3s; }
.health-legend {
  display: flex; gap: 10px; flex-wrap: wrap; font-size: 10px; color: #6b7280;
  margin-top: 5px; padding-bottom: 10px;
}
.hl-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; }

/* Due-soon section */
.oc-section { padding: 10px 16px; border-top: 1px solid #f3f4f6; }
.oc-section-title {
  font-size: 10px; color: #9ca3af; text-transform: uppercase;
  letter-spacing: 0.05em; font-weight: 600; margin-bottom: 6px;
}
.due-item {
  display: flex; align-items: baseline; gap: 6px;
  padding: 4px 0; border-bottom: 1px solid #f9fafb; font-size: 11px;
}
.due-item:last-child { border-bottom: none; }
.due-name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: #374151;
}
.due-date { font-size: 10px; color: #6b7280; white-space: nowrap; }
.due-days-red { color: #dc2626; font-weight: 600; font-size: 10px; white-space: nowrap; }
.due-days-amber { color: #d97706; font-weight: 600; font-size: 10px; white-space: nowrap; }
.due-days-ok { color: #9ca3af; font-size: 10px; white-space: nowrap; }

/* Upcoming 2-month summary */
.bucket-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
}
.bucket-row {
  display: flex; flex-direction: column; gap: 2px;
  background: #f9fafb; border-radius: 5px; padding: 6px 8px;
  font-size: 11px;
}
.bucket-name { color: #374151; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bucket-counts { display: flex; gap: 5px; flex-wrap: wrap; }
.bc-chip {
  font-size: 9px; font-weight: 600; padding: 1px 5px;
  border-radius: 8px; white-space: nowrap;
}
.bc-total { background: #f3f4f6; color: #6b7280; }
.bc-red { background: #fee2e2; color: #dc2626; }
.bc-green { background: #dcfce7; color: #16a34a; }
.bc-blue { background: #dbeafe; color: #2563eb; }
.bc-risk { background: #fef3c7; color: #d97706; }

/* Overload badge */
.badge-overload { background: #fee2e2; color: #dc2626; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }
.badge-busy { background: #fef3c7; color: #d97706; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }
.badge-ok { background: #dcfce7; color: #16a34a; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }

.pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
.pill-red { background: #fee2e2; color: #dc2626; }
.pill-green { background: #dcfce7; color: #16a34a; }
.pill-blue { background: #dbeafe; color: #2563eb; }
.pill-yellow { background: #fef9c3; color: #92400e; }
.pill-gray { background: #f3f4f6; color: #6b7280; }

.empty-state { text-align: center; padding: 60px 0; color: #9ca3af; font-size: 13px; }

/* No items in section */
.no-items { font-size: 11px; color: #9ca3af; font-style: italic; padding: 4px 0; }

/* Risk tooltip */
.risk-tip-wrap { position: relative; display: inline-block; }
.risk-tip-wrap:hover .risk-tip { display: block; }
.risk-tip {
  display: none;
  position: absolute; top: calc(100% + 6px); right: 0;
  background: #1a1a2e; color: #fff;
  border-radius: 7px; padding: 10px 12px;
  font-size: 11px; line-height: 1.5;
  min-width: 260px; max-width: 340px;
  z-index: 500; box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  white-space: normal;
}
.risk-tip::before {
  content: ''; position: absolute; bottom: 100%; right: 10px;
  border: 5px solid transparent; border-bottom-color: #1a1a2e;
}
.risk-tip-title {
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px;
}
.risk-tip table { width: 100%; border-collapse: collapse; }
.risk-tip td {
  padding: 3px 4px; vertical-align: top; font-size: 11px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.risk-tip tr:last-child td { border-bottom: none; }
.risk-tip .rt-name { color: #fff; font-weight: 500; padding-right: 8px; width: 38%; }
.risk-tip .rt-end { color: rgba(255,255,255,0.5); white-space: nowrap; padding-right: 8px; font-size: 10px; }
.risk-tip .rt-detail { color: rgba(255,255,255,0.65); }

/* See Red/Risk/Deps mode */
.alert-mode-btn {
  padding: 4px 12px; border-radius: 4px;
  border: 1.5px solid #dc2626; color: #dc2626;
  background: transparent; cursor: pointer; font-size: 11px;
  font-weight: 600; white-space: nowrap; transition: all 0.15s;
}
.alert-mode-btn:hover, .alert-mode-btn.active {
  background: #dc2626; color: #fff;
}
.alert-grid { padding: 10px 16px; }
.alert-table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
.alert-table th {
  text-align: left; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: #9ca3af; padding: 4px 6px 6px;
  border-bottom: 2px solid #e2e5ea;
}
.alert-table td {
  padding: 5px 6px; border-bottom: 1px solid #f3f4f6;
  vertical-align: top; color: #374151;
}
.alert-table tr:last-child td { border-bottom: none; }
.alert-table tr:hover td { background: #fafafa; }
.at-primary { font-weight: 500; color: #1a1a2e; }
.at-date { white-space: nowrap; color: #6b7280; }
.at-pct { white-space: nowrap; color: #6b7280; }
.at-risk-flag { text-align: center; }
.at-dep { }
.dep-link { color: #2563eb; text-decoration: underline; cursor: pointer; white-space: nowrap; font-size: 11px; }

/* Floating dependency detail panel (JS-positioned, fixed) */
#dep-tip {
  display: none; position: fixed; z-index: 9999;
  background: #1a1a2e; color: #fff;
  border-radius: 8px; padding: 12px 14px;
  font-size: 11px; line-height: 1.5;
  min-width: 300px; max-width: 440px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
  pointer-events: none;
}
#dep-tip .dt-title { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.dep-block { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.dep-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.dep-block-name { font-weight: 700; color: #fff; margin-bottom: 5px; }
.dep-block table { width: 100%; border-collapse: collapse; }
.dep-block td { padding: 2px 4px; vertical-align: top; font-size: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06); }
.dep-block tr:last-child td { border-bottom: none; }
.dep-block .dk { color: rgba(255,255,255,0.45); padding-right: 8px; white-space: nowrap; }
.dep-block .dv { color: rgba(255,255,255,0.85); }

/* Floating item detail tooltip */
#item-tip {
  display: none; position: fixed; z-index: 9999;
  background: #1a1a2e; color: #fff;
  border-radius: 8px; padding: 12px 14px;
  font-size: 11px; line-height: 1.5;
  min-width: 300px; max-width: 420px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
  pointer-events: none;
}
#item-tip .it-parent {
  font-size: 10px; color: rgba(255,255,255,0.45);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 6px;
}
#item-tip .it-title {
  font-size: 13px; font-weight: 700; color: #fff;
  margin-bottom: 10px; line-height: 1.35;
}
#item-tip table { width: 100%; border-collapse: collapse; }
#item-tip td {
  padding: 3px 0; vertical-align: top; font-size: 11px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
#item-tip tr:last-child td { border-bottom: none; }
#item-tip .it-key { color: rgba(255,255,255,0.45); padding-right: 10px; white-space: nowrap; width: 1%; }
#item-tip .it-val { color: #fff; }
.due-name { cursor: default; }
</style>
</head>

const TODAY_STR = '2026-05-21';
const TWO_WEEKS = 14;
const TWO_MONTHS = 61;

function parseDate(s) {
  if (!s) return null;
  const [y,mo,d] = s.split('-').map(Number);
  return new Date(y, mo-1, d);
}
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
function fmtDate(s) {
  if (!s) return '';
  return parseDate(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtDateFull(s) {
  if (!s) return '';
  return parseDate(s).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const today      = parseDate(TODAY_STR);
const twoWeeksEnd  = new Date(today.getTime() + TWO_WEEKS  * 86400000);
const twoMonthsEnd = new Date(today.getTime() + TWO_MONTHS * 86400000);

// ── Item detail tooltip (floating, JS-positioned) ──────────────
const itemTip = document.getElementById('item-tip');
let tipTimeout;

function showItemTip(r, targetEl) {
  clearTimeout(tipTimeout);
  const fields = [
    ['Program',      r.program],
    ['Initiative',   r.initiative],
    ['Project',      r.project],
    ['Health',       r.health],
    ['Status',       r.status],
    ['% Complete',   r.pctDisplay],
    ['Start Date',   r.startDate ? fmtDate(r.startDate) : ''],
    ['End Date',     r.endDate   ? fmtDate(r.endDate)   : ''],
    ['Duration',     r.duration],
    ['Group Owner',  r.groupOwner],
    ['Risk',         r.risk ? 'Yes' : 'No'],
    ['Risk Details', r.riskDetails],
  ].filter(([, v]) => v !== null && v !== undefined && String(v).trim() !== '' && v !== false);

  const rows = fields.map(([k, v]) =>
    `<tr><td class="it-key">${escHtml(k)}</td><td class="it-val">${escHtml(String(v))}</td></tr>`
  ).join('');

  const parentHtml = r.parentName
    ? `<div class="it-parent">under: ${escHtml(r.parentName)}</div>`
    : '';

  itemTip.innerHTML = `${parentHtml}<div class="it-title">${escHtml(r.primary)}</div><table><tbody>${rows}</tbody></table>`;
  itemTip.style.display = 'block';
  positionItemTip(targetEl);
}

function positionItemTip(el) {
  const rect = el.getBoundingClientRect();
  const tipW = 420, tipH = itemTip.offsetHeight;
  let left = rect.left;
  let top  = rect.bottom + 6;
  if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
  if (top + tipH > window.innerHeight - 8) top = rect.top - tipH - 6;
  itemTip.style.left = left + 'px';
  itemTip.style.top  = top  + 'px';
}

function hideItemTip() {
  tipTimeout = setTimeout(() => { itemTip.style.display = 'none'; }, 80);
}

// Build a lookup map from row id → full row object for the tooltip
const ROW_BY_ID = Object.fromEntries(ALL_ROWS.map(r => [r.id, r]));
// Build a lookup from row number (human row #) → full row object for dependency resolution
const ROW_BY_ROWNUM = Object.fromEntries(ALL_ROWS.map(r => [r.rowNum, r]));

// ── Alert mode state ──────────────────────────────────────────
let alertMode = false;

function parseDeps(depStr) {
  // "20FS,21FS" → [20, 21]; handles suffixes like FS, SS, etc.
  if (!depStr) return [];
  return depStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
}

function buildDepTipContent(depNums) {
  if (!depNums.length) return '';
  const blocks = depNums.map(num => {
    const r = ROW_BY_ROWNUM[num];
    if (!r) return `<div class="dep-block"><div class="dep-block-name">#${num} (not found)</div></div>`;
    const fields = [
      ['Details',      r.details],
      ['Start Date',   r.startDate ? fmtDate(r.startDate) : ''],
      ['End Date',     r.endDate   ? fmtDate(r.endDate)   : ''],
      ['% Complete',   r.pctDisplay],
      ['Risk',         r.risk ? 'Yes' : ''],
      ['Risk Details', r.riskDetails],
    ].filter(([,v]) => v !== null && v !== undefined && String(v).trim() !== '' && v !== false);
    const fRows = fields.map(([k,v]) =>
      `<tr><td class="dk">${escHtml(k)}</td><td class="dv">${escHtml(String(v))}</td></tr>`
    ).join('');
    return `<div class="dep-block">
      <div class="dep-block-name">${escHtml(r.primary)}</div>
      <table><tbody>${fRows}</tbody></table>
    </div>`;
  }).join('');
  return `<div class="dt-title">Dependencies</div>${blocks}`;
}

// Floating dep-tip (fixed, escapes overflow:hidden on cards)
const depTipEl = document.getElementById('dep-tip');
let depTipTimeout;
function showDepTip(depNums, targetEl) {
  clearTimeout(depTipTimeout);
  const content = buildDepTipContent(depNums);
  if (!content) return;
  depTipEl.innerHTML = content;
  depTipEl.style.display = 'block';
  const rect = targetEl.getBoundingClientRect();
  const tipW = 440;
  let left = rect.left;
  let top  = rect.bottom + 6;
  if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
  if (left < 8) left = 8;
  if (top + depTipEl.offsetHeight > window.innerHeight - 8) top = rect.top - depTipEl.offsetHeight - 6;
  depTipEl.style.left = left + 'px';
  depTipEl.style.top  = top  + 'px';
}
function hideDepTip() {
  depTipTimeout = setTimeout(() => { depTipEl.style.display = 'none'; }, 80);
}

    return `<div class="alert-grid"><span class="no-items">No Red or Risk items.</span></div>`;
  }
  const sorted = [...o.alertItems].sort((a,b) => (a.endDate||'').localeCompare(b.endDate||''));
  const trs = sorted.map(r => {
    const depNums = parseDeps(r.dependency);
    const depNames = depNums.map(n => {
      const dr = ROW_BY_ROWNUM[n];
      return dr ? dr.primary : `#${n}`;
    });
    const depCell = depNums.length === 0 ? '—' : (() => {
      const label = depNames.map(n => escHtml(n.length > 28 ? n.slice(0,28)+'…' : n)).join(', ');
      return `<span class="dep-link dep-hover" data-depnums="${depNums.join(',')}">${label}</span>`;
    })();
    const h = (r.health||'').toLowerCase();
    const hPill = h === 'red' ? `<span class="pill pill-red">Red</span>` : '';
    const rPill = r.risk ? `<span class="pill pill-yellow">⚑</span>` : '';
    return `<tr>
      <td class="at-primary">${escHtml(r.primary)} ${hPill} ${rPill}</td>
      <td class="at-date">${r.startDate ? fmtDate(r.startDate) : '—'}</td>
      <td class="at-date">${r.endDate ? fmtDate(r.endDate) : '—'}</td>
      <td class="at-pct">${r.pctDisplay || '—'}</td>
      <td class="at-risk-flag">${r.risk ? '⚑' : ''}</td>
      <td>${escHtml(r.riskDetails || '')}</td>
      <td class="at-dep">${depCell}</td>
    </tr>`;
  }).join('');
  return `<div class="alert-grid">
    <table class="alert-table">
      <thead><tr>
        <th>Task</th><th>Start</th><th>End</th>
        <th>% Done</th><th>Risk</th><th>Risk Detail</th><th>Dependencies</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>
  </div>`;
}

// ── State ─────────────────────────────────────────────────────
const state = { levelMax: 3, programs: new Set(), initiatives: new Set(), projects: new Set() };

// ── Hierarchy maps ─────────────────────────────────────────────
// program → Set of initiatives; initiative → Set of projects
const progToInits = {};
const initToProjs = {};
ALL_ROWS.forEach(r => {
  const prog = r.program || '';
  const init = r.initiative || '';
  const proj = r.project || '';
  if (prog) {
    if (!progToInits[prog]) progToInits[prog] = new Set();
    if (init) progToInits[prog].add(init);
  }
  if (init) {
    if (!initToProjs[init]) initToProjs[init] = new Set();
    if (proj) initToProjs[init].add(proj);
  }
});
const allPrograms    = Object.keys(progToInits).sort();
const allInitiatives = Object.keys(initToProjs).sort();
const allProjects    = [...new Set(ALL_ROWS.map(r => r.project).filter(Boolean))].sort();

// ── Cascade helpers ───────────────────────────────────────────
function visibleInitiatives() {
  if (state.programs.size === 0) return allInitiatives;
  const s = new Set();
  state.programs.forEach(p => (progToInits[p]||new Set()).forEach(i => s.add(i)));
  return allInitiatives.filter(i => s.has(i));
}
function visibleProjects() {
  const activeInits = state.initiatives.size > 0
    ? [...state.initiatives]
    : visibleInitiatives();
  const s = new Set();
  activeInits.forEach(i => (initToProjs[i]||new Set()).forEach(p => s.add(p)));
  // also include projects from programs if initiative column may be blank
  if (state.programs.size > 0 && state.initiatives.size === 0) {
    ALL_ROWS.forEach(r => {
      if (state.programs.has(r.program) && r.project) s.add(r.project);
    });
  }
  if (s.size === 0) return allProjects; // fallback: no initiative links found
  return allProjects.filter(p => s.has(p));
}

// ── Dropdown builder ──────────────────────────────────────────
function buildDropdown(panelId, allId, items, onChange) {
  const panel = document.getElementById(panelId);
  panel.innerHTML = '';
  const allDiv = document.createElement('div'); allDiv.className = 'dd-opt';
  allDiv.innerHTML = `<input type="checkbox" id="${allId}" checked><label for="${allId}"><strong>All</strong></label>`;
  panel.appendChild(allDiv);
  const divider = document.createElement('div'); divider.className = 'dd-divider';
  panel.appendChild(divider);
  items.forEach((item, i) => {
    const d = document.createElement('div'); d.className = 'dd-opt';
    const id = `${allId}-${i}`;
    d.innerHTML = `<input type="checkbox" id="${id}" value="${escHtml(item)}" checked><label for="${id}">${escHtml(item)}</label>`;
    panel.appendChild(d);
  });
  const allChk = panel.querySelector('#' + allId);
  allChk.addEventListener('change', () => {
    panel.querySelectorAll('input[value]').forEach(c => c.checked = allChk.checked);
    onChange();
  });
  panel.querySelectorAll('input[value]').forEach(c => c.addEventListener('change', () => {
    const all = [...panel.querySelectorAll('input[value]')];
    allChk.checked = all.every(c => c.checked);
    onChange();
  }));
}
function getChecked(panelId) {
  return [...document.querySelectorAll(`#${panelId} input[value]:checked`)].map(c => c.value);
}

function rebuildInitDropdown() {
  const vis = visibleInitiatives();
  buildDropdown('init-panel', 'init-all', vis, onInitChange);
  // Preserve prior selection where still visible
  if (state.initiatives.size > 0) {
    document.querySelectorAll('#init-panel input[value]').forEach(c => {
      c.checked = state.initiatives.has(c.value);
    });
    const allChk = document.getElementById('init-all');
    if (allChk) {
      const all = [...document.querySelectorAll('#init-panel input[value]')];
      allChk.checked = all.every(c => c.checked);
    }
  }
  updateInitBtn();
}
function rebuildProjDropdown() {
  const vis = visibleProjects();
  buildDropdown('proj-panel', 'proj-all', vis, onProjChange);
  if (state.projects.size > 0) {
    document.querySelectorAll('#proj-panel input[value]').forEach(c => {
      c.checked = state.projects.has(c.value);
    });
    const allChk = document.getElementById('proj-all');
    if (allChk) {
      const all = [...document.querySelectorAll('#proj-panel input[value]')];
      allChk.checked = all.every(c => c.checked);
    }
  }
  updateProjBtn();
}

function updateProgBtn() {
  document.getElementById('prog-btn').textContent =
    state.programs.size === 0 ? 'All programs ▾' : `${state.programs.size} program(s) ▾`;
}
function updateInitBtn() {
  document.getElementById('init-btn').textContent =
    state.initiatives.size === 0 ? 'All initiatives ▾' : `${state.initiatives.size} initiative(s) ▾`;
}
function updateProjBtn() {
  document.getElementById('proj-btn').textContent =
    state.projects.size === 0 ? 'All projects ▾' : `${state.projects.size} project(s) ▾`;
}

function onProgChange() {
  const checked = getChecked('prog-panel');
  state.programs = checked.length === allPrograms.length ? new Set() : new Set(checked);
  // clear downstream if they have selections that are no longer visible
  const nowVisInits = visibleInitiatives();
  state.initiatives = new Set([...state.initiatives].filter(i => nowVisInits.includes(i)));
  rebuildInitDropdown();
  const nowVisProjs = visibleProjects();
  state.projects = new Set([...state.projects].filter(p => nowVisProjs.includes(p)));
  rebuildProjDropdown();
  updateProgBtn();
  render();
}
function onInitChange() {
  const vis = visibleInitiatives();
  const checked = getChecked('init-panel');
  state.initiatives = checked.length === vis.length ? new Set() : new Set(checked);
  const nowVisProjs = visibleProjects();
  state.projects = new Set([...state.projects].filter(p => nowVisProjs.includes(p)));
  rebuildProjDropdown();
  updateInitBtn();
  render();
}
function onProjChange() {
  const vis = visibleProjects();
  const checked = getChecked('proj-panel');
  state.projects = checked.length === vis.length ? new Set() : new Set(checked);
  updateProjBtn();
  render();
}

// Initial build
buildDropdown('prog-panel', 'prog-all', allPrograms, onProgChange);
buildDropdown('init-panel', 'init-all', allInitiatives, onInitChange);
buildDropdown('proj-panel', 'proj-all', allProjects, onProjChange);

// Dropdown toggle wiring
['prog','init','proj'].forEach(prefix => {
  document.getElementById(`${prefix}-btn`).addEventListener('click', e => {
    e.stopPropagation();
    const panel = document.getElementById(`${prefix}-panel`);
    const wasOpen = panel.classList.contains('open');
    document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('open'));
    if (!wasOpen) panel.classList.add('open');
  });
  document.getElementById(`${prefix}-panel`).addEventListener('click', e => e.stopPropagation());
});
document.addEventListener('click', () =>
  document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('open')));

document.querySelectorAll('.lvl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.levelMax = +btn.dataset.max;
    render();
  });
});

// ── Filter rows ────────────────────────────────────────────────
// levelRows: respects both level cap and hierarchy filters (for tallies)
// allRows:   respects only hierarchy filters (for due-soon / buckets at any depth)
function applyFilters() {
  const allRows = ALL_ROWS.filter(r => {
    if (state.programs.size > 0 && !state.programs.has(r.program)) return false;
    if (state.initiatives.size > 0 && !state.initiatives.has(r.initiative)) return false;
    if (state.projects.size > 0 && !state.projects.has(r.project)) return false;
    return true;
  });
  const levelRows = allRows.filter(r => {
    if (state.levelMax < 99 && (r.lvl === 0 || r.lvl > state.levelMax)) return false;
    return true;
  });
  return { levelRows, allRows };
}

// ── Split owners ──────────────────────────────────────────────
function splitOwners(raw) {
  if (!raw) return [];
  return raw.split(/[,\/]/).map(s => s.trim()).filter(Boolean);
}

// ── Build per-owner data ───────────────────────────────────────
// levelRows: level-filtered rows (for health/count tallies)
// allRows:   program-filtered only (for due-soon + 2-month buckets at any depth)
function buildOwnerMap(levelRows, allRows) {
  const map = {};
  function get(name) {
    if (!map[name]) map[name] = {
      name,
      total: 0,
      red: 0, green: 0, blue: 0, yellow: 0, noHealth: 0,
      risk: 0,
      riskItems: [],  // { primary, endDate, riskDetails } for tooltip
      alertItems: [], // full row objs: red health OR risk flag
      dueSoon: [],    // end within 2 weeks — leaf rows only
      buckets: {},    // lvl3 bucket name → { total, red, green, blue, risk }
    };
    return map[name];
  }

  // Health/count tallies: true leaves across all depths — parents inherit
  // rolled-up health so we must exclude them. Level filter is for display only;
  // leaves typically live at level 4+ and would vanish behind a level 1-3 cap.
  allRows.filter(r => r.isLeaf).forEach(r => {
    const owners = splitOwners(r.groupOwner);
    if (!owners.length) owners.push('(Unassigned)');
    const h = (r.health || '').toLowerCase();
    owners.forEach(owner => {
      const o = get(owner);
      o.total++;
      if      (h === 'red')    o.red++;
      else if (h === 'green')  o.green++;
      else if (h === 'blue')   o.blue++;
      else if (h === 'yellow') o.yellow++;
      else                     o.noHealth++;
      if (r.risk) {
        o.risk++;
        o.riskItems.push({ primary: r.primary, endDate: r.endDate || '', riskDetails: r.riskDetails || '' });
      }
      if (h === 'red' || r.risk) {
        if (!o.alertItems.find(x => x.id === r.id)) o.alertItems.push(r);
      }
    });
  });

  // Due-soon + 2-month buckets use all-level rows so deep items aren't hidden
  allRows.forEach(r => {
    const owners = splitOwners(r.groupOwner);
    if (!owners.length) owners.push('(Unassigned)');
    const h = (r.health || '').toLowerCase();

    owners.forEach(owner => {
      // Only credit owners that already appear (avoid adding owner-only entries
      // for owners hidden by the level filter)
      if (!map[owner]) return;
      const o = map[owner];

      // Due within 2 weeks — leaf rows only to avoid parent/child duplication
      if (r.isLeaf && r.endDate) {
        const end = parseDate(r.endDate);
        if (end >= today && end <= twoWeeksEnd) {
          if (!o.dueSoon.find(x => x.id === r.id)) o.dueSoon.push(r);
        }
      }

      // 2-month bucket: group by lvl3 ancestor → project → program
      if (r.endDate) {
        const end = parseDate(r.endDate);
        if (end >= today && end <= twoMonthsEnd) {
          const bucket = r.lvl3 || r.project || r.program || '(Other)';
          if (!o.buckets[bucket]) o.buckets[bucket] = { total: 0, red: 0, green: 0, blue: 0, risk: 0 };
          const b = o.buckets[bucket];
          b.total++;
          if (h === 'red')   b.red++;
          if (h === 'green') b.green++;
          if (h === 'blue')  b.blue++;
          if (r.risk)        b.risk++;
        }
      }
    });
  });

  // Sort dueSoon by end date
  Object.values(map).forEach(o => o.dueSoon.sort((a,b) => (a.endDate||'').localeCompare(b.endDate||'')));
  return map;
}

// ── Summary bar ────────────────────────────────────────────────
function renderSummary(ownerMap, rows) {
  const owners = Object.values(ownerMap).filter(o => o.name !== '(Unassigned)');
  const totalOwners = owners.length;
  const totalItems  = rows.length;
  const overloaded  = owners.filter(o => o.dueSoon.length > 5).length;
  const maxLoad     = owners.reduce((m,o) => Math.max(m, o.total), 0);
  const busyOwner   = owners.find(o => o.total === maxLoad);
  const noOwner     = rows.filter(r => !r.groupOwner).length;

  document.getElementById('summary-bar').innerHTML = [
    { num: totalOwners, label: 'Group Owners', detail: 'with active items', cls: 'info' },
    { num: totalItems,  label: 'Active items', detail: 'incomplete, all levels', cls: 'info' },
    { num: overloaded,  label: 'Owners overloaded', detail: '>5 leaf items due in 2 wks', cls: overloaded > 0 ? 'warn' : 'ok' },
    { num: maxLoad,     label: 'Most items', detail: busyOwner ? `owned by ${busyOwner.name}` : '', cls: maxLoad > 20 ? 'caution' : 'ok' },
    { num: noOwner,     label: 'Unassigned items', detail: 'no group owner set', cls: noOwner > 0 ? 'caution' : 'ok' },
  ].map(c => `<div class="sum-card ${c.cls}">
    <div class="sc-num">${c.num}</div>
    <div class="sc-label">${c.label}</div>
    <div class="sc-detail">${c.detail}</div>
  </div>`).join('');
}

// ── Health bar HTML ───────────────────────────────────────────
function healthBar(o) {
  const total = o.total || 1;
  const segs = [
    { pct: o.red    / total * 100, color: '#ef4444', label: 'Red' },
    { pct: o.yellow / total * 100, color: '#f59e0b', label: 'Yellow' },
    { pct: o.green  / total * 100, color: '#27ae60', label: 'Green' },
    { pct: o.blue   / total * 100, color: '#4a90d9', label: 'Blue' },
    { pct: o.noHealth / total * 100, color: '#d1d5db', label: '—' },
  ].filter(s => s.pct > 0);
  const barHtml = segs.map(s =>
    `<div class="hb-seg" style="width:${s.pct.toFixed(1)}%;background:${s.color}"></div>`
  ).join('');
  const legendParts = [
    o.red    > 0 ? `<span><span class="hl-dot" style="background:#ef4444"></span>${o.red} Red</span>` : '',
    o.yellow > 0 ? `<span><span class="hl-dot" style="background:#f59e0b"></span>${o.yellow} Yellow</span>` : '',
    o.green  > 0 ? `<span><span class="hl-dot" style="background:#27ae60"></span>${o.green} Green</span>` : '',
    o.blue   > 0 ? `<span><span class="hl-dot" style="background:#4a90d9"></span>${o.blue} Blue</span>` : '',
    o.noHealth > 0 ? `<span><span class="hl-dot" style="background:#d1d5db"></span>${o.noHealth} —</span>` : '',
  ].filter(Boolean).join('');
  return `<div class="health-bar-wrap">
    <div class="health-bar-label">Health breakdown</div>
    <div class="health-bar">${barHtml}</div>
    <div class="health-legend">${legendParts}</div>
  </div>`;
}

// ── Due soon list ─────────────────────────────────────────────
function dueSoonHtml(o) {
  if (!o.dueSoon.length) {
    return `<div class="oc-section">
      <div class="oc-section-title">Due in next 2 weeks</div>
      <div class="no-items">Nothing due in next 14 days</div>
    </div>`;
  }
  const shown = o.dueSoon.slice(0, 6);
  const more  = o.dueSoon.length - shown.length;
  const items = shown.map(r => {
    const d = parseDate(r.endDate);
    const days = daysBetween(today, d);
    let daysCls, daysStr;
    if (days <= 0)       { daysCls = 'due-days-red';   daysStr = days === 0 ? 'Today' : `${-days}d overdue`; }
    else if (days <= 3)  { daysCls = 'due-days-red';   daysStr = `+${days}d`; }
    else if (days <= 7)  { daysCls = 'due-days-amber'; daysStr = `+${days}d`; }
    else                 { daysCls = 'due-days-ok';    daysStr = `+${days}d`; }
    const riskMark = r.risk ? ' ⚑' : '';
    const h = (r.health||'').toLowerCase();
    const dot = h === 'red' ? ' 🔴' : '';
    return `<div class="due-item">
      <span class="due-name due-tip-trigger" data-rowid="${r.id}">${escHtml(r.primary)}${riskMark}${dot}</span>
      <span class="due-date">${fmtDate(r.endDate)}</span>
      <span class="${daysCls}">${daysStr}</span>
    </div>`;
  }).join('');
  const moreHtml = more > 0 ? `<div style="font-size:10px;color:#9ca3af;padding:4px 0">+${more} more items…</div>` : '';
  return `<div class="oc-section">
    <div class="oc-section-title">Due in next 2 weeks (${o.dueSoon.length})</div>
    ${items}${moreHtml}
  </div>`;
}

// Attach item-tip and dep-tip events after each render (event delegation on main-content)
function bindItemTips() {
  const mc = document.getElementById('main-content');
  mc.addEventListener('mouseover', e => {
    const el = e.target.closest('.due-tip-trigger');
    if (el) { const r = ROW_BY_ID[el.dataset.rowid]; if (r) showItemTip(r, el); }
    const dep = e.target.closest('.dep-hover');
    if (dep) {
      const nums = dep.dataset.depnums.split(',').map(Number).filter(n => !isNaN(n));
      showDepTip(nums, dep);
    }
  });
  mc.addEventListener('mouseout', e => {
    if (e.target.closest('.due-tip-trigger')) hideItemTip();
    if (e.target.closest('.dep-hover')) hideDepTip();
  });
}

// ── 2-month buckets ───────────────────────────────────────────
function bucketsHtml(o) {
  const buckets = Object.entries(o.buckets).sort((a,b) => b[1].total - a[1].total);
  if (!buckets.length) {
    return `<div class="oc-section">
      <div class="oc-section-title">Upcoming 2-month work (by project)</div>
      <div class="no-items">Nothing ending in next 2 months</div>
    </div>`;
  }
  const rows = buckets.slice(0, 8).map(([name, b]) => {
    const chips = [
      `<span class="bc-chip bc-total">${b.total} items</span>`,
      b.red   > 0 ? `<span class="bc-chip bc-red">${b.red} Red</span>` : '',
      b.green > 0 ? `<span class="bc-chip bc-green">${b.green} Green</span>` : '',
      b.blue  > 0 ? `<span class="bc-chip bc-blue">${b.blue} Blue</span>` : '',
      b.risk  > 0 ? `<span class="bc-chip bc-risk">⚑ ${b.risk}</span>` : '',
    ].filter(Boolean).join('');
    return `<div class="bucket-row">
      <div class="bucket-name" title="${escHtml(name)}">${escHtml(name)}</div>
      <div class="bucket-counts">${chips}</div>
    </div>`;
  }).join('');
  const more = buckets.length > 8 ? `<div style="font-size:10px;color:#9ca3af;margin-top:4px;padding:0 0 6px">+${buckets.length-8} more projects…</div>` : '';
  return `<div class="oc-section">
    <div class="oc-section-title">Upcoming work next 2 months (by work item)</div>
    <div class="bucket-grid">${rows}</div>
    ${more}
  </div>`;
}

// ── Overload badge ────────────────────────────────────────────
function overloadBadge(o) {
  if (o.dueSoon.length > 5) return `<span class="badge-overload">Overloaded</span>`;
  if (o.red > 0 || o.dueSoon.length > 2) return `<span class="badge-busy">Busy</span>`;
  return `<span class="badge-ok">On track</span>`;
}

// ── Owner card ────────────────────────────────────────────────
function ownerCard(o) {
  let riskBadge = '';
  if (o.risk > 0) {
    const rows = o.riskItems.map(ri =>
      `<tr>
        <td class="rt-name">${escHtml(ri.primary.length > 32 ? ri.primary.slice(0,32)+'…' : ri.primary)}</td>
        <td class="rt-end">${ri.endDate ? fmtDate(ri.endDate) : '—'}</td>
        <td class="rt-detail">${escHtml(ri.riskDetails || '(no details)')}</td>
      </tr>`
    ).join('');
    riskBadge = `<span class="risk-tip-wrap">
      <span class="pill pill-yellow">⚑ ${o.risk} risk${o.risk>1?'s':''}</span>
      <div class="risk-tip">
        <div class="risk-tip-title">Risk items</div>
        <table><tbody>${rows}</tbody></table>
      </div>
    </span>`;
  }
  const alertCount = o.alertItems ? o.alertItems.length : 0;
  const alertBadge = alertMode && alertCount > 0
    ? `<span class="pill pill-red">${alertCount} alert${alertCount!==1?'s':''}</span>` : '';
  const cardBody = alertMode
    ? alertGridHtml(o)
    : `${healthBar(o)}${dueSoonHtml(o)}${bucketsHtml(o)}`;
  return `<div class="owner-card">
    <div class="oc-header">
      <div>
        <div class="oc-name">${escHtml(o.name)}</div>
        <div class="oc-count">${o.total} active item${o.total!==1?'s':''}</div>
      </div>
      <div class="oc-badges">
        ${alertMode ? alertBadge : overloadBadge(o)}
        ${riskBadge}
      </div>
    </div>
    ${cardBody}
  </div>`;
}

// ── Main render ───────────────────────────────────────────────
function render() {
  const { levelRows, allRows } = applyFilters();
  const ownerMap = buildOwnerMap(levelRows, allRows);
  renderSummary(ownerMap, levelRows);

  let owners = Object.values(ownerMap).filter(o => o.name !== '(Unassigned)');
  const unassigned = ownerMap['(Unassigned)'];
  owners.sort((a,b) => b.total - a.total);

  document.getElementById('result-count').textContent =
    `${owners.length} owner${owners.length !== 1 ? 's' : ''}`;

  const content = document.getElementById('main-content');
  if (!owners.length) {
    content.innerHTML = '<div class="empty-state">No active items found.</div>';
    return;
  }

  // Pinned content teams — always shown first in fixed row order
  const ROW1 = ['OG', 'RAD', 'LCO'];
  const ROW2 = ['TTPM', 'STC', 'AMT'];
  const PINNED = [...ROW1, ...ROW2];
  const ownerByName = Object.fromEntries(owners.map(o => [o.name, o]));

  function pinnedCard(name) {
    const o = ownerByName[name];
    // Render a placeholder if this owner has no active items under current filters
    if (!o) return `<div class="owner-card" style="opacity:0.35;border-style:dashed">
      <div class="oc-header"><div><div class="oc-name">${escHtml(name)}</div>
      <div class="oc-count" style="font-style:italic">no active items</div></div></div>
    </div>`;
    return ownerCard(o);
  }

  // Remainder: not pinned, sorted by workload
  const remainder = owners
    .filter(o => !PINNED.includes(o.name))
    .sort((a,b) => (b.dueSoon.length - a.dueSoon.length) || (b.red - a.red) || (b.total - a.total));

  const sections = [];

  // Row 1: OG, RAD, LCO
  sections.push(`<div class="section-header">Content Teams — Row 1</div>
    <div class="owner-grid-3">${ROW1.map(pinnedCard).join('')}</div>`);

  // Row 2: TTPM, STC, AMT
  sections.push(`<div class="section-header">Content Teams — Row 2</div>
    <div class="owner-grid-3">${ROW2.map(pinnedCard).join('')}</div>`);

  // Remainder grouped by load
  if (remainder.length) {
    const overloaded = remainder.filter(o => o.dueSoon.length > 5);
    const busy       = remainder.filter(o => !overloaded.includes(o) && (o.red > 0 || o.dueSoon.length > 2));
    const onTrack    = remainder.filter(o => !overloaded.includes(o) && !busy.includes(o));

    if (overloaded.length) {
      sections.push(`<div class="section-header" style="color:#dc2626">Other — Overloaded (${overloaded.length})</div>
        <div class="owner-grid">${overloaded.map(ownerCard).join('')}</div>`);
    }
    if (busy.length) {
      sections.push(`<div class="section-header" style="color:#d97706">Other — Busy (${busy.length})</div>
        <div class="owner-grid">${busy.map(ownerCard).join('')}</div>`);
    }
    if (onTrack.length) {
      sections.push(`<div class="section-header">Other — On Track (${onTrack.length})</div>
        <div class="owner-grid">${onTrack.map(ownerCard).join('')}</div>`);
    }
  }

  if (unassigned && unassigned.total > 0) {
    sections.push(`<div class="section-header" style="color:#9ca3af">Unassigned (${unassigned.total} items)</div>
      <div class="owner-grid">${ownerCard(unassigned)}</div>`);
  }

  content.innerHTML = sections.join('');
}

render();
bindItemTips();

document.getElementById('alert-mode-btn').addEventListener('click', function() {
  alertMode = !alertMode;
  this.classList.toggle('active', alertMode);
  render();
});
</script>
</body>
</html>
